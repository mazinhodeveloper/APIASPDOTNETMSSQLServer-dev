services:
  api:
    build:
      context: ./API
      dockerfile: Dockerfile
    container_name: api-dev
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      # ASP.NET reads "ConnectionStrings__DefaultConnection" and maps it to appsettings.json
      - ConnectionStrings__DefaultConnection=Server=${SQL_SERVER},${SQL_PORT};Database=${SQL_DATABASE};User Id=${SQL_USER};Password=${SQL_PASSWORD};TrustServerCertificate=True;
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT}
      - ASPNETCORE_URLS=http://+:8080
      # If using JWT, pass them here:
      # - JWT_SECRET=${JWT_SECRET}
      # - JWT_EXPIRY_HOURS=${JWT_EXPIRY_HOURS}
    depends_on:
      mssql:
        condition: service_healthy
    networks:
      - dev-network

  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: mssql-dev
    ports:
      - "1433:1433"
    env_file:
      - .env
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=${SQL_PASSWORD}
      - MSSQL_PID=Developer
    healthcheck:
      # Updated to use ${SQL_PASSWORD} instead of hardcoded password
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P '${SQL_PASSWORD}' -C -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - dev-network

networks:
  dev-network:
    driver: bridge
